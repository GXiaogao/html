<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- 字符集 -->
        <meta charset="utf-8">
        <!-- 设置网页在移动设备上的缩放比例，适配移动端 -->  
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>【新思想引领新征程】推进长江十年禁渔 谱写长江大保护新篇章</title>
    </head>

    <body>
        <!-- 定义一个一级标题，标题内容为【新思想引领新征程】推进长江十年禁渔 谱写长江大保护新篇章 -->
        <h1>
            【新思想引领新征程】推进长江十年禁渔 谱写长江大保护新篇章
        </h1>
        <!-- 定义一个超链接，里面展示 央视网 -->
         <!-- a 超链接标签：
            href属性：指定超链接的目标地址
            target属性：指定超链接打开的方式
                _blank：在新窗口打开
                _self：在当前窗口打开
                _parent：在父窗口打开
                _top：在顶部窗口打开 -->
        <!-- 定义一个超链接，里面展示 央视网 -->
        <a href="https://www.cctv.com/" target="_blank">央视网</a>
        <a href="https://www.baidu.com/" target="_top">百度</a>
        <a href="https://www.taobao.com/" target="_self">淘宝</a>
        <a href="https://www.jd.com/" target="_parent">京东</a>
        <!-- 定义一个段落，里面展示当前时间 -->
        <p>
            2023年10月1日 10:00:00
        </p>
    </body>
</html>
