<!DOCTYPE html>
<html lang="en">
    <head>
        <title>HTML快速入门</title>
        <!-- 字符集 -->
        <meta charset="utf-8">
        <!-- 设置网页在移动设备上的缩放比例，适配移动端 -->  
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>

    <body>
        <h1>
            Hello,HTML.
        </h1>
        <img src="img/飞机-旅行.png">
        <img src="img/飞机-旅行.png" alt="飞机-旅行">
        <!-- 定义一个一级标题，标题内容为Hello，HTML -->
        <h1>Hello,HTML.</h1>
        <!-- 定义一个图像，图像的路径为img/飞机-旅行.png，图像的描述为飞机-旅行 -->
        <img src="img/飞机-旅行.png" alt="飞机-旅行">
    </body>
</html>
